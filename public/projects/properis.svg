<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0a0a1a"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow1" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grid)"/>
  <circle cx="400" cy="200" r="180" fill="url(#glow1)" opacity="0.5"/>
  <!-- House icon -->
  <path d="M400 80 L520 170 L520 300 L280 300 L280 170 Z" fill="none" stroke="#818cf8" stroke-width="3" opacity="0.6"/>
  <rect x="340" y="220" width="50" height="80" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <rect x="420" y="220" width="40" height="40" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <!-- Dashboard lines -->
  <rect x="180" y="320" width="120" height="8" rx="4" fill="#4f46e5" opacity="0.4"/>
  <rect x="320" y="320" width="80" height="8" rx="4" fill="#7c3aed" opacity="0.3"/>
  <rect x="420" y="320" width="100" height="8" rx="4" fill="#6366f1" opacity="0.35"/>
  <rect x="540" y="320" width="60" height="8" rx="4" fill="#818cf8" opacity="0.25"/>
  <!-- Text -->
  <text x="400" y="370" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="14" opacity="0.6">PROPERIS — Gestion Conciergerie</text>
</svg>
