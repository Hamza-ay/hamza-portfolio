<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0a0a1a"/>
  <defs>
    <linearGradient id="nn1" x1="100" y1="200" x2="700" y2="200">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="url(#nn1)" opacity="0.15"/>
  <!-- Neural network layers -->
  <!-- Input layer -->
  <circle cx="150" cy="100" r="12" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
  <circle cx="150" cy="160" r="12" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
  <circle cx="150" cy="220" r="12" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
  <circle cx="150" cy="280" r="12" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
  <!-- Hidden 1 -->
  <circle cx="320" cy="80" r="12" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <circle cx="320" cy="150" r="12" fill="#6366f1" fill-opacity="0.3" stroke="#818cf8" stroke-width="2" opacity="0.7"/>
  <circle cx="320" cy="220" r="12" fill="#6366f1" fill-opacity="0.2" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <circle cx="320" cy="290" r="12" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.6"/>
  <!-- Hidden 2 -->
  <circle cx="490" cy="110" r="12" fill="#7c3aed" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>
  <circle cx="490" cy="190" r="12" fill="#7c3aed" fill-opacity="0.4" stroke="#a78bfa" stroke-width="2" opacity="0.8"/>
  <circle cx="490" cy="270" r="12" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  <!-- Output -->
  <circle cx="650" cy="150" r="14" fill="#8b5cf6" fill-opacity="0.4" stroke="#c084fc" stroke-width="2.5" opacity="0.8"/>
  <circle cx="650" cy="230" r="14" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.6"/>
  <!-- Connections (selected) -->
  <line x1="162" y1="100" x2="308" y2="80" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <line x1="162" y1="100" x2="308" y2="150" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="162" y1="160" x2="308" y2="150" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="162" y1="220" x2="308" y2="220" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  <line x1="162" y1="280" x2="308" y2="290" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <line x1="162" y1="160" x2="308" y2="220" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <line x1="332" y1="150" x2="478" y2="190" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="332" y1="80" x2="478" y2="110" stroke="#818cf8" stroke-width="1" opacity="0.25"/>
  <line x1="332" y1="220" x2="478" y2="190" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="332" y1="290" x2="478" y2="270" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <line x1="502" y1="110" x2="636" y2="150" stroke="#a78bfa" stroke-width="1.5" opacity="0.35"/>
  <line x1="502" y1="190" x2="636" y2="150" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <line x1="502" y1="270" x2="636" y2="230" stroke="#a78bfa" stroke-width="1" opacity="0.25"/>
  <!-- Labels -->
  <text x="150" y="340" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11" opacity="0.5">Input</text>
  <text x="320" y="340" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="11" opacity="0.5">Hidden</text>
  <text x="490" y="340" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11" opacity="0.5">Hidden</text>
  <text x="650" y="340" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="11" opacity="0.5">Output</text>
  <text x="400" y="380" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="14" opacity="0.6">Deep Neural Network — MNIST</text>
</svg>
