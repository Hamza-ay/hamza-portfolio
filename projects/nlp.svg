<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0a0a1a"/>
  <defs>
    <linearGradient id="nlp1" x1="0" y1="200" x2="800" y2="200">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="url(#nlp1)" opacity="0.12"/>
  <!-- Document icons -->
  <rect x="80" y="80" width="60" height="75" rx="4" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
  <line x1="95" y1="100" x2="125" y2="100" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <line x1="95" y1="112" x2="120" y2="112" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <line x1="95" y1="124" x2="127" y2="124" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <line x1="95" y1="136" x2="115" y2="136" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <rect x="80" y="200" width="60" height="75" rx="4" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.5"/>
  <line x1="95" y1="220" x2="125" y2="220" stroke="#f87171" stroke-width="1" opacity="0.4"/>
  <line x1="95" y1="232" x2="120" y2="232" stroke="#f87171" stroke-width="1" opacity="0.3"/>
  <line x1="95" y1="244" x2="127" y2="244" stroke="#f87171" stroke-width="1" opacity="0.4"/>
  <line x1="95" y1="256" x2="115" y2="256" stroke="#f87171" stroke-width="1" opacity="0.3"/>
  <!-- Arrow to preprocessing -->
  <line x1="150" y1="117" x2="230" y2="170" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="237" x2="230" y2="190" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <!-- Preprocessing box -->
  <rect x="230" y="145" width="120" height="70" rx="8" fill="#06b6d4" fill-opacity="0.1" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <text x="290" y="175" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11" opacity="0.7">Pandas</text>
  <text x="290" y="195" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9" opacity="0.5">preprocessing</text>
  <!-- Arrow to model -->
  <line x1="350" y1="180" x2="430" y2="180" stroke="#818cf8" stroke-width="1.5" opacity="0.3"/>
  <polygon points="428,175 438,180 428,185" fill="#818cf8" opacity="0.4"/>
  <!-- Decision tree -->
  <circle cx="510" cy="120" r="10" fill="#6366f1" fill-opacity="0.3" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
  <line x1="503" y1="128" x2="480" y2="155" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="517" y1="128" x2="540" y2="155" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <circle cx="480" cy="165" r="8" fill="#6366f1" fill-opacity="0.2" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <circle cx="540" cy="165" r="8" fill="#6366f1" fill-opacity="0.2" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="474" y1="172" x2="460" y2="195" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <line x1="486" y1="172" x2="500" y2="195" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  <circle cx="460" cy="205" r="6" fill="#34d399" fill-opacity="0.4" stroke="#34d399" stroke-width="1" opacity="0.6"/>
  <circle cx="500" cy="205" r="6" fill="#f87171" fill-opacity="0.4" stroke="#f87171" stroke-width="1" opacity="0.6"/>
  <!-- SVM separator -->
  <rect x="570" y="100" width="120" height="130" rx="6" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="140" r="4" fill="#34d399" opacity="0.6"/>
  <circle cx="615" cy="155" r="4" fill="#34d399" opacity="0.5"/>
  <circle cx="595" cy="165" r="4" fill="#34d399" opacity="0.6"/>
  <circle cx="660" cy="160" r="4" fill="#f87171" opacity="0.6"/>
  <circle cx="670" cy="140" r="4" fill="#f87171" opacity="0.5"/>
  <circle cx="655" cy="180" r="4" fill="#f87171" opacity="0.6"/>
  <line x1="630" y1="110" x2="630" y2="220" stroke="#c084fc" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <text x="630" y="245" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10" opacity="0.5">SVM</text>
  <!-- Output -->
  <line x1="630" y1="255" x2="700" y2="290" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <rect x="680" y="275" width="80" height="40" rx="6" fill="#10b981" fill-opacity="0.15" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
  <text x="720" y="298" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="11" opacity="0.7">REAL</text>
  <rect x="680" y="325" width="80" height="40" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#f87171" stroke-width="1.5" opacity="0.6"/>
  <text x="720" y="348" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="11" opacity="0.7">FAKE</text>
  <!-- Labels -->
  <text x="110" y="87" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10" opacity="0.5">Real news</text>
  <text x="110" y="197" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="10" opacity="0.5">Fake news</text>
  <text x="510" y="100" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="10" opacity="0.5">Decision Tree</text>
  <text x="400" y="380" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="14" opacity="0.6">NLP Classification — Fake News Detection</text>
</svg>
